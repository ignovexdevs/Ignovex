version: "3.9"

services:
  ignovex:
    build: .
    container_name: ignovex-engine
    volumes:
      - .:/app
    command: python -m pytest tests/ -v

  dashboard:
    image: node:20-alpine
    container_name: ignovex-dashboard
    working_dir: /app
    volumes:
      - ./dashboard:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
